<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
  <defs>
    <!-- Metallic Gold Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8860B" />
      <stop offset="20%" stop-color="#DAA520" />
      <stop offset="40%" stop-color="#FDF5E6" />
      <stop offset="60%" stop-color="#FFD700" />
      <stop offset="80%" stop-color="#CFB53B" />
      <stop offset="100%" stop-color="#806517" />
    </linearGradient>

    <!-- Soft Golden Glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFDF0" stop-opacity="1" />
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </radialGradient>

    <!-- Drop Shadow for realism -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#8B7322" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background Glow -->
  <circle cx="300" cy="300" r="280" fill="url(#glow)" />

  <g filter="url(#shadow)">
    <!-- 1. TOP CREST & "20" -->
    <g transform="translate(300, 110)" text-anchor="middle">
      <!-- Decorative arches above 20 -->
      <path d="M -30,-50 C -30,-70 30,-70 30,-50 C 15,-55 -15,-55 -30,-50 Z" fill="url(#gold-grad)" />
      <path d="M -15,-55 Q 0,-75 15,-55 Q 0,-60 -15,-55" fill="none" stroke="url(#gold-grad)" stroke-width="2" />
      <circle cx="0" cy="-73" r="4" fill="url(#gold-grad)" />
      
      <!-- Crown-like peak -->
      <path d="M -8,-50 L 0,-62 L 8,-50 Z" fill="url(#gold-grad)" />

      <!-- Small Hebrew Label "פועל" above "20" -->
      <text y="-35" font-family="'Frank Ruhl Libre', 'David', 'Georgia', serif" font-size="13" font-weight="900" fill="#AA7C11" letter-spacing="1">פועל</text>
      
      <!-- Big "20" in golden display style -->
      <text y="5" font-family="'Cinzel', 'Playfair Display', 'Georgia', serif" font-size="44" font-weight="bold" fill="url(#gold-grad)" letter-spacing="2">20</text>
      
      <!-- Laurel-like tiny curves underneath "20" -->
      <path d="M -35,-8 Q -10,-3 0,8 Q 10,-3 35,-8" fill="none" stroke="url(#gold-grad)" stroke-width="2" />
      <path d="M -25,2 C -15,10 0,10 0,10 C 0,10 15,10 25,2" fill="none" stroke="url(#gold-grad)" stroke-width="1.5" />
    </g>

    <!-- 2. MAGNIFICENT BOTH-SIDE FLOURISHES (Baroque gold leaf branches) -->
    <!-- Left Hand Side Flourish -->
    <g transform="translate(190, 340)">
      <!-- Wave 1 -->
      <path d="M 0,-150 C -40,-130 -80,-80 -90,0 C -100,80 -50,140 20,150 C -10,135 -30,110 -30,80 C -30,40 10,20 15,0 C 20,-30 0,-70 -30,-80 C -50,-85 -60,-110 0,-150 Z" fill="none" stroke="url(#gold-grad)" stroke-width="2.5" />
      <!-- Swirly interior leaf 1 -->
      <path d="M -60,-20 A 30,30 0 0,0 -80,40 C -70,30 -60,20 -55,0" fill="url(#gold-grad)" />
      <!-- Swirly interior leaf 2 -->
      <path d="M -40,-70 C -70,-80 -65,-40 -50,-50" fill="none" stroke="url(#gold-grad)" stroke-width="2" />
      <!-- Leaf flourishes pointing out -->
      <path d="M -85,-10 C -120,0 -110,-30 -80,-20" fill="url(#gold-grad)" />
      <path d="M -75,60 C -105,90 -115,60 -80,45" fill="url(#gold-grad)" />
      <path d="M -35,110 C -65,150 -85,110 -50,95" fill="url(#gold-grad)" />
      <path d="M 5,145 C -25,185 -50,150 -15,135" fill="url(#gold-grad)" />
    </g>

    <!-- Right Hand Side Flourish (Symmetrical Mirror) -->
    <g transform="translate(410, 340) scale(-1, 1)">
      <path d="M 0,-150 C -40,-130 -80,-80 -90,0 C -100,80 -50,140 20,150 C -10,135 -30,110 -30,80 C -30,40 10,20 15,0 C 20,-30 0,-70 -30,-80 C -50,-85 -60,-110 0,-150 Z" fill="none" stroke="url(#gold-grad)" stroke-width="2.5" />
      <path d="M -60,-20 A 30,30 0 0,0 -80,40 C -70,30 -60,20 -55,0" fill="url(#gold-grad)" />
      <path d="M -40,-70 C -70,-80 -65,-40 -50,-50" fill="none" stroke="url(#gold-grad)" stroke-width="2" />
      <path d="M -85,-10 C -120,0 -110,-30 -80,-20" fill="url(#gold-grad)" />
      <path d="M -75,60 C -105,90 -115,60 -80,45" fill="url(#gold-grad)" />
      <path d="M -35,110 C -65,150 -85,110 -50,95" fill="url(#gold-grad)" />
      <path d="M 5,145 C -25,185 -50,150 -15,135" fill="url(#gold-grad)" />
    </g>

    <!-- 3. CENTRAL OVAL EMBLEM FRAME -->
    <ellipse cx="300" cy="350" rx="122" ry="172" fill="none" stroke="url(#gold-grad)" stroke-width="4" />
    <ellipse cx="300" cy="350" rx="116" ry="166" fill="white" stroke="url(#gold-grad)" stroke-width="1.2" />

    <!-- Inner decorative dotted border -->
    <ellipse cx="300" cy="350" rx="110" ry="160" fill="none" stroke="url(#gold-grad)" stroke-width="2" stroke-dasharray="4,5" />

    <!-- 4. TORAH SCROLL IN CORES -->
    <g transform="translate(285, 335) rotate(-15)">
      <!-- Left Wood Roller poles -->
      <rect x="-35" y="-82" width="6" height="164" rx="2" fill="url(#gold-grad)" />
      <path d="M -38,-82 L -26,-82 L -32,-94 Z" fill="url(#gold-grad)" />
      <path d="M -38,82 L -26,82 L -32,94 Z" fill="url(#gold-grad)" />
      
      <!-- Right Wood Roller poles -->
      <rect x="25" y="-82" width="6" height="164" rx="2" fill="url(#gold-grad)" />
      <path d="M 22,-82 L 34,-82 L 28,-94 Z" fill="url(#gold-grad)" />
      <path d="M 22,82 L 34,82 L 28,94 Z" fill="url(#gold-grad)" />

      <!-- Golden Crown (כתר) on top of Torah Scroll -->
      <g transform="translate(-2, -88) scale(0.7)">
        <path d="M -30,0 L -15,-25 L 0,-5 L 15,-25 L 30,0 Z" fill="url(#gold-grad)" />
        <circle cx="-15" cy="-25" r="3" fill="url(#gold-grad)" />
        <circle cx="0" cy="-5" r="3" fill="url(#gold-grad)" />
        <circle cx="15" cy="-25" r="3" fill="url(#gold-grad)" />
        <rect x="-25" y="0" width="50" height="6" rx="2" fill="url(#gold-grad)" />
      </g>

      <!-- Royal Parchment base -->
      <path d="M -26,-66 C 0,-60 0,-60 22,-66 L 22,66 C 0,60 0,60 -26,66 Z" fill="url(#gold-grad)" />
      <path d="M -23,-63 C 0,-57 0,-57 19,-63 L 19,63 C 0,57 0,57 -23,63 Z" fill="#FFFDF2" />

      <!-- Center lines showing text guidelines or Decalogue -->
      <line x1="-12" y1="-40" x2="-2" y2="-40" stroke="#E6C25E" stroke-width="1.5" />
      <line x1="-12" y1="-30" x2="-2" y2="-30" stroke="#E6C25E" stroke-width="1.5" />
      <line x1="-12" y1="-20" x2="-2" y2="-20" stroke="#E6C25E" stroke-width="1.5" />
      <line x1="-12" y1="-10" x2="-2" y2="-10" stroke="#E6C25E" stroke-width="1.5" />
      <line x1="-12" y1="0" x2="-2" y2="0" stroke="#E6C25E" stroke-width="1.5" />
      <line x1="-12" y1="10" x2="-2" y2="10" stroke="#E6C25E" stroke-width="1.5" />
      <line x1="-12" y1="20" x2="-2" y2="20" stroke="#E6C25E" stroke-width="1.5" />
      <line x1="-12" y1="30" x2="-2" y2="30" stroke="#E6C25E" stroke-width="1.5" />

      <line x1="2" y1="-40" x2="12" y2="-40" stroke="#E6C25E" stroke-width="1.5" />
      <line x1="2" y1="-30" x2="12" y2="-30" stroke="#E6C25E" stroke-width="1.5" />
      <line x1="2" y1="-20" x2="12" y2="-20" stroke="#E6C25E" stroke-width="1.5" />
      <line x1="2" y1="-10" x2="12" y2="-10" stroke="#E6C25E" stroke-width="1.5" />
      <line x1="2" y1="0" x2="12" y2="0" stroke="#E6C25E" stroke-width="1.5" />
      <line x1="2" y1="10" x2="12" y2="10" stroke="#E6C25E" stroke-width="1.5" />
      <line x1="2" y1="20" x2="12" y2="20" stroke="#E6C25E" stroke-width="1.5" />
      <line x1="2" y1="30" x2="12" y2="30" stroke="#E6C25E" stroke-width="1.5" />

      <!-- Elegant gold velvet strap (חגורה) wrapping scroll -->
      <rect x="-24" y="-5" width="46" height="10" fill="url(#gold-grad)" />
      <rect x="-24" y="-3" width="46" height="6" fill="#8B0000" /> <!-- deep red velvet accent -->
    </g>

    <!-- Stylized Hands holding the Torah Scroll scroll -->
    <g transform="translate(250, 350)" fill="url(#gold-grad)" opacity="0.95">
      <!-- Right hand sleeve/cuff -->
      <path d="M 0,-15 C 10,-15 15,-10 18,-2 C 5,1 0,3 -5,-2 Z" />
      <!-- Fingers grasping -->
      <path d="M 12,-10 C 18,-6 20,2 14,5 C 11,2 8,-2 12,-10" />
    </g>
    <g transform="translate(325, 320) scale(-1, 1)" fill="url(#gold-grad)" opacity="0.95">
      <!-- Left hand sleeve/cuff -->
      <path d="M 0,-15 C 10,-15 15,-10 18,-2 C 5,1 0,3 -5,-2 Z" />
      <!-- Fingers grasping -->
      <path d="M 12,-10 C 18,-6 20,2 14,5 C 11,2 8,-2 12,-10" />
    </g>

    <!-- 5. ROYAL HEBREW CALIGRAPHY TEXT -->
    <g transform="translate(300, 350)" text-anchor="middle">
      <!-- תומכי תורה -->
      <text x="50" y="-35" font-family="'Frank Ruhl Libre', 'David', 'Georgia', 'Times New Roman', serif" font-size="21" font-weight="900" fill="#AA7C11" letter-spacing="1">תומכי</text>
      <text x="50" y="-12" font-family="'Frank Ruhl Libre', 'David', 'Georgia', 'Times New Roman', serif" font-size="21" font-weight="900" fill="#AA7C11" letter-spacing="1">תורה</text>
      
      <!-- ישיבת -->
      <text x="35" y="14" font-family="'Frank Ruhl Libre', 'David', 'Georgia', 'Times New Roman', serif" font-size="23" font-weight="800" fill="url(#gold-grad)" letter-spacing="1.5">ישיבת</text>
      
      <!-- כנסת יחזקאל -->
      <text x="0" y="52" font-family="'Frank Ruhl Libre', 'David', 'Georgia', 'Times New Roman', serif" font-size="33" font-weight="900" fill="url(#gold-grad)" letter-spacing="0.5">כנסת</text>
      <text x="0" y="88" font-family="'Frank Ruhl Libre', 'David', 'Georgia', 'Times New Roman', serif" font-size="33" font-weight="900" fill="url(#gold-grad)" letter-spacing="0.5">יחזקאל</text>
      
      <!-- אלעד -->
      <text x="0" y="112" font-family="'Frank Ruhl Libre', 'David', 'Georgia', 'Times New Roman', serif" font-size="16" font-weight="bold" fill="#B8860B" letter-spacing="1">אלעד</text>
    </g>

    <!-- 6. ESTABLISHED YEAR ACCENT AT BOTTOM OUTSIDE INNER OVAL -->
    <g transform="translate(300, 532)" text-anchor="middle">
      <path d="M -75,-15 Q 0,-30 75,-15" fill="none" stroke="url(#gold-grad)" stroke-width="1.5" />
      <text y="5" font-family="'Frank Ruhl Libre', 'David', 'Georgia', 'Times New Roman', serif" font-size="16" font-weight="bold" fill="#AA7C11" letter-spacing="1">מאז תשס״א</text>
      
      <!-- Small gold stars/dots details -->
      <circle cx="-90" cy="-10" r="2.5" fill="url(#gold-grad)" />
      <circle cx="90" cy="-10" r="2.5" fill="url(#gold-grad)" />
    </g>
  </g>
</svg>
